<!DOCTYPE html>
<html>
<head>

    <title>SCADA MOBILE PRO</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
          rel="stylesheet"/>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>

        body{
            background:#111827;
            color:white;
            font-family:Arial;
        }

        .card{
            background:#1f2937;
            border:none;
            border-radius:15px;
            margin-bottom:20px;
        }

        .form-control,
        .form-select{
            background:#374151;
            color:white;
            border:none;
        }

        .table{
            color:white;
        }

        .nav-tabs .nav-link{
            color:white;
        }

        .nav-tabs .nav-link.active{
            background:#2563eb;
            color:white;
            border:none;
        }

        .select2-container--default .select2-selection--single{
            height:38px;
            background:#374151;
            border:none;
            color:white;
        }

        .select2-dropdown{
            background:#1f2937;
            color:white;
        }

        .select2-search__field{
            background:#374151 !important;
            color:white !important;
        }

    </style>

</head>

<body>

<div class="container-fluid p-3">

    <h2 class="text-center mb-4">
        SCADA MOBILE PRO
    </h2>

    <!-- ================================================= -->
    <!-- NAVIGATION -->
    <!-- ================================================= -->

    <ul class="nav nav-tabs mb-4">

        <li class="nav-item">

            <button class="nav-link active"
                    data-bs-toggle="tab"
                    data-bs-target="#parametersTab">

                Parameters

            </button>

        </li>

        <li class="nav-item">

            <button class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#formulaTab">

                Formulas

            </button>

        </li>

        <li class="nav-item">

            <button class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#solverTab">

                Solver

            </button>

        </li>

        <li class="nav-item">

            <button class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#formTab">

                Forms

            </button>

        </li>

        <li class="nav-item">

            <button class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#rcaTab">

                RCA

            </button>

        </li>

    </ul>

    <!-- ================================================= -->
    <!-- TAB CONTENT -->
    <!-- ================================================= -->

    <div class="tab-content">

        <!-- ================================================= -->
        <!-- PARAMETERS TAB -->
        <!-- ================================================= -->

        <div class="tab-pane fade show active"
             id="parametersTab">

            <div class="card p-3">

                <div class="row">

                    <div class="col-md-4">

                        <input id="paramKey"
                               class="form-control mb-2"
                               placeholder="Parameter Key">

                        <input id="paramName"
                               class="form-control mb-2"
                               placeholder="Parameter Name">

                        <input id="paramUnit"
                               class="form-control mb-2"
                               placeholder="Unit">

                        <button class="btn btn-success w-100 mb-2"
                                onclick="addParameter()">

                            Save Parameter

                        </button>

                        <button class="btn btn-danger w-100"
                                onclick="deleteParameter()">

                            Delete Parameter

                        </button>

                    </div>

                    <div class="col-md-8">

                        <input id="paramSearch"
                               class="form-control mb-3"
                               placeholder="Search Parameter"
                               onkeyup="filterParameters()">

                        <div id="paramList"></div>

                    </div>

                </div>

            </div>

        </div>

        <!-- ================================================= -->
        <!-- FORMULA TAB -->
        <!-- ================================================= -->

        <div class="tab-pane fade"
             id="formulaTab">

            <div class="card p-3">

                <div class="row">

                    <div class="col-md-4">

                        <input id="formulaName"
                               class="form-control mb-2"
                               placeholder="Formula Name">

                        <textarea id="formulaEq"
                                  class="form-control mb-2"
                                  placeholder="Example: P = V * I"></textarea>

                        <button class="btn btn-success w-100 mb-2"
                                onclick="addFormula()">

                            Save Formula

                        </button>

                        <button class="btn btn-danger w-100"
                                onclick="deleteFormula()">

                            Delete Formula

                        </button>

                    </div>

                    <div class="col-md-8">

                        <input id="formulaSearch"
                               class="form-control mb-3"
                               placeholder="Search Formula"
                               onkeyup="filterFormulas()">

                        <div id="formulaList"></div>

                    </div>

                </div>

            </div>

        </div>

        <!-- ================================================= -->
        <!-- SOLVER TAB -->
        <!-- ================================================= -->

        <div class="tab-pane fade"
             id="solverTab">

            <div class="card p-3">

                <select id="formulaSelect"
                        class="form-select mb-3"
                        onchange="loadFormula()">

                </select>

                <div id="solverInputs"></div>

                <button class="btn btn-primary mt-3"
                        onclick="solveFormula()">

                    Solve Formula

                </button>

                <div id="solverResult"
                     class="mt-3 fs-4"></div>

            </div>

        </div>

        <!-- ================================================= -->
        <!-- FORM TAB -->
        <!-- ================================================= -->

        <div class="tab-pane fade"
             id="formTab">

            <div class="card p-3">

                <div class="row mb-3">

                    <div class="col-md-4">

                        <input id="formName"
                               class="form-control"
                               placeholder="Form Name">

                    </div>

                    <div class="col-md-8 d-flex gap-2 flex-wrap">

                        <button class="btn btn-success"
                                onclick="saveForm()">

                            Save Form

                        </button>

                        <button class="btn btn-primary"
                                onclick="addFormRow()">

                            Add Row

                        </button>

                        <button class="btn btn-warning"
                                onclick="solveForm()">

                            Solve Form

                        </button>

                        <button class="btn btn-danger"
                                onclick="deleteForm()">

                            Delete Form

                        </button>

                    </div>

                </div>

                <input id="formSearch"
                       class="form-control mb-3"
                       placeholder="Search Forms"
                       onkeyup="filterForms()">

                <div id="formList"
                     class="mb-4"></div>

                <div class="table-responsive">

                    <table class="table table-bordered">

                        <thead>

                        <tr>

                            <th>Type</th>
                            <th>Name</th>
                            <th>Value</th>
                            <th>Delete</th>

                        </tr>

                        </thead>

                        <tbody id="formTableBody"></tbody>

                    </table>

                </div>

            </div>

        </div>

        <!-- ================================================= -->
        <!-- RCA TAB -->
        <!-- ================================================= -->

        <div class="tab-pane fade"
             id="rcaTab">

            <div class="card p-3">

                <div class="row">

                    <div class="col-md-4">

                        <input id="rcaParam"
                               class="form-control mb-2"
                               placeholder="Parameter"
                               onkeyup="rcaParameterChanged()">

                        <input id="causeParameter"
                               class="form-control mb-2"
                               placeholder="Cause Parameter"
                               onkeyup="causeParameterChanged()">

                        <input id="designValue"
                               class="form-control mb-2"
                               placeholder="Design Value">

                        <textarea id="causeText"
                                  class="form-control mb-2"
                                  placeholder="Cause"></textarea>

                        <textarea id="highReasons"
                                  class="form-control mb-2"
                                  placeholder="High Causes"></textarea>

                        <textarea id="lowReasons"
                                  class="form-control mb-2"
                                  placeholder="Low Causes"></textarea>

                        <button class="btn btn-success w-100 mb-2"
                                onclick="saveRCA()">

                            Save RCA

                        </button>

                        <button class="btn btn-danger w-100"
                                onclick="deleteRCA()">

                            Delete RCA

                        </button>

                    </div>

                    <div class="col-md-8">

                        <input id="rcaSearch"
                               class="form-control mb-3"
                               placeholder="Search RCA"
                               onkeyup="filterRCA()">

                        <div id="rcaList"></div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="/static/app.js"></script>

</body>
</html>
